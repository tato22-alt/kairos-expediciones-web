<section class="container my-5">
  <div class="row g-4">

    <!-- Expedición 1 -->
    <article class="col-12 col-md-6 col-lg-4">
      <figure class="card h-100 shadow-sm p-2">
        <img src="img/socotra.webp" class="card-img-top" alt="Montañas exóticas de Socotra en Yemen" loading="lazy" width="100%" height="auto">
        <figcaption class="card-body">
          <p class="card-text mb-1"><strong>Socotra: El santuario de lo extraño</strong></p>
          <p class="card-text">La isla de Socotra estuvo aislada millones de años, lo que permitió la evolución de flora y fauna completamente irrepetibles en el resto del mundo.</p>
          <a href="socotra.html" class="btn btn-secondary">Ver más</a>
        </figcaption>
      </figure>
    </article>

    <!-- Expedición 2 -->
    <article class="col-12 col-md-6 col-lg-4">
      <figure class="card h-100 shadow-sm p-2">
        <img src="img/malvinas.webp" class="card-img-top" alt="Paisaje natural de las Islas Malvinas" loading="lazy" width="100%" height="auto">
        <figcaption class="card-body">
          <p class="card-text mb-1"><strong>Islas Malvinas: Ecos del pasado, voces del futuro</strong></p>
          <p class="card-text">En 1820, el marino argentino David Jewett izó por primera vez la bandera argentina en las islas, proclamando la soberanía del país sobre ellas.</p>
          <a href="malvinas.html" class="btn btn-secondary">Ver más</a>
        </figcaption>
      </figure>
    </article>

    <!-- Expedición 3 -->
    <article class="col-12 col-md-6 col-lg-4">
      <figure class="card h-100 shadow-sm p-2">
        <img src="img/papua_occidental.webp" class="card-img-top" alt="Paisaje de selva en Papúa Occidental" loading="lazy" width="100%" height="auto">
        <figcaption class="card-body">
          <p class="card-text mb-1"><strong>Papúa Occidental: Tribus del tiempo</strong></p>
          <p class="card-text">Algunos rituales de iniciación en Papúa incluyen escarificaciones que imitan la piel de cocodrilo, símbolo de poder y conexión con el inframundo.</p>
          <a href="papua.html" class="btn btn-secondary">Ver más</a>
        </figcaption>
      </figure>
    </article>

    <!-- Expedición 4 -->
    <article class="col-12 col-md-6 col-lg-4">
      <figure class="card h-100 shadow-sm p-2">
        <img src="img/machu-picchu.avif" class="card-img-top" alt="Vista aérea de Machu Picchu en Perú" loading="lazy" width="100%" height="auto">
        <figcaption class="card-body">
          <p class="card-text mb-1"><strong>Machu Picchu: Tras las huellas del imperio Inca</strong></p>
          <p class="card-text">Machu Picchu fue una ciudad sagrada y astronómica. Sus estructuras están alineadas con los solsticios y las estrellas, demostrando el vínculo profundo entre los incas y el cosmos.</p>
          <a href="macchupicchu.html" class="btn btn-secondary">Ver más</a>
        </figcaption>
      </figure>
    </article>

    <!-- Expedición 5 -->
    <article class="col-12 col-md-6 col-lg-4">
      <figure class="card h-100 shadow-sm p-2">
        <img src="img/tibet.jpg" class="card-img-top" alt="Paisaje montañoso nevado del Tíbet" loading="lazy" width="100%" height="auto">
        <figcaption class="card-body">
          <p class="card-text mb-1"><strong>Tibet: El techo del mundo</strong></p>
          <p class="card-text">Durante siglos, el Tíbet fue uno de los pocos lugares en el mundo donde se creía que la reencarnación del Dalai Lama era un proceso sagrado y guiado por señales místicas.</p>
          <a href="tibet.html" class="btn btn-secondary">Ver más</a>
        </figcaption>
      </figure>
    </article>

    <!-- Expedición 6 -->
    <article class="col-12 col-md-6 col-lg-4">
      <figure class="card h-100 shadow-sm p-2">
        <img src="img/moai.jpeg" class="card-img-top" alt="Moai tallado en piedra en la Isla de Pascua" loading="lazy" width="100%" height="auto">
        <figcaption class="card-body">
          <p class="card-text mb-1"><strong>Isla de Pascua: Misterios del Pacífico</strong></p>
          <p class="card-text">En esta isla los moáis no solo tienen cabezas. Muchas de estas estatuas milenarias también tienen cuerpos completos enterrados bajo tierra, ocultos por siglos.</p>
          <a href="moai.html" class="btn btn-secondary">Ver más</a>
        </figcaption>
      </figure>
    </article>

    <!-- Expedición 7 -->
    <article class="col-12 col-md-6 col-lg-4">
      <figure class="card h-100 shadow-sm p-2">
        <img src="img/auroral-boreal.jpg" class="card-img-top" alt="Aurora boreal iluminando las Islas Lofoten" loading="lazy" width="100%" height="auto">
        <figcaption class="card-body">
          <p class="card-text mb-1"><strong>Islas Lofoten: Auroras Boreales Mágicas</strong></p>
          <p class="card-text">Aunque remoto, Lofoten está lleno de vida. Águilas marinas, zorros árticos y surfistas del frío conviven entre leyendas vikingas, tormentas imprevistas y rutas escarpadas que invitan a explorar.</p>
          <a href="auroras.html" class="btn btn-secondary">Ver más</a>
        </figcaption>
      </figure>
    </article>

    <!-- Expedición 8 -->
    <article class="col-12 col-md-6 col-lg-4">
      <figure class="card h-100 shadow-sm p-2">
        <img src="img/siberia.jpg" class="card-img-top" alt="Paisaje nevado en Siberia con cráter de Batagaika" loading="lazy" width="100%" height="auto">
        <figcaption class="card-body">
          <p class="card-text mb-1"><strong>Siberia: El llamado del frío eterno</strong></p>
          <p class="card-text">El cráter de Batagaika crece cada año y revela capas geológicas antiguas, alertando sobre el deshielo global. Su apertura revela capas geológicas antiguas y alerta sobre el deshielo irreversible causado por el cambio climático acelerado.</p>
          <a href="siberia.html" class="btn btn-secondary">Ver más</a>
        </figcaption>
      </figure>
    </article>

    <!-- Expedición 9 -->
    <article class="col-12 col-md-6 col-lg-4">
      <figure class="card h-100 shadow-sm p-2">
        <img src="img/athenas.jpg" class="card-img-top" alt="Ruinas clásicas griegas en la ciudad de Atenas" loading="lazy" width="100%" height="auto">
        <figcaption class="card-body">
          <p class="card-text mb-1"><strong>Atenas: El latido antiguo de la civilización</strong></p>
          <p class="card-text">Bajo las calles modernas de Atenas se encuentran templos, tumbas y artefactos de más de 2.500 años de antigüedad. Cada vez que se construye una línea de metro, aparecen templos, tumbas y artefactos de la Antigua Grecia.</p>
          <a href="atenas.html" class="btn btn-secondary">Ver más</a>
        </figcaption>
      </figure>
    </article>
